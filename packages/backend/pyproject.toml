[project]
name = "apohara-inti-backend"
version = "0.1.0"
description = "Backend FastAPI service for Apohara Inti — Gemini writer + 9-vendor adversarial ensemble + INV-15 memory isolation"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "pydantic>=2.0",
  "google-genai>=1.0",
  "apohara-aegis @ git+https://github.com/SuarezPM/apohara-aegis.git@main",
  "apohara-context-forge @ git+https://github.com/SuarezPM/Apohara_Context_Forge.git@main",
]

[project.optional-dependencies]
dev = ["pytest>=9.0", "pytest-asyncio>=0.24", "httpx>=0.27"]

[tool.setuptools]
# Flat-layout module list — explicit since P1+P3 added lobstertrap_client +
# rate_limiter alongside main.py, which trips setuptools auto-discovery.
py-modules = ["main", "lobstertrap_client", "rate_limiter"]
